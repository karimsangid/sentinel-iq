version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_CHAT_MODEL=llama3
      - OLLAMA_EMBED_MODEL=nomic-embed-text
    volumes:
      - app_data:/app/data
    depends_on:
      - ollama

volumes:
  ollama_data:
  app_data:
